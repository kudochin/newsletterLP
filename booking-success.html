  <main class="booking-main">
    <!-- Step Indicator (all completed) -->
    <div class="step-indicator">
      <div class="step completed" data-step="1">
        <div class="step-number">✓</div>
        <span class="step-label">日時を選択</span>

      <div class="step-line"></div>
      <div class="step completed" data-step="2">
        <div class="step-number">✓</div>

      </div>
      <div class="step-line"></div>
      <div class="step active" data-step="3">
        <div class="step-number">✓</div>
        <span class="step-label">予約完了</span>
      </div>
    </div>

    <!-- Completion Content -->
    <section class="booking-step active">
      <div class="complete-container">
        <div class="complete-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"

            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2 class="complete-title">ご予約ありがとうございます</h2>
        <p class="complete-message">
          ご予約・お支払いが完了しました。<br>

          記載しておりますので、当日はそちらからご参加ください。
        </p>
        <div class="complete-details" id="complete-details">
          <p style="text-align: center; color: var(--text-light); font-size: 0.85rem;">
            予約内容は確認メールをご覧ください
          </p>
        </div>
        <a href="/online.html" class="btn-primary">オンライン相談ページへ戻る</a>
      </div>
    </section>
  </main>

  <footer class="booking-footer">
